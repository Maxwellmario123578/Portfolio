<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Motif de grille -->
  <g opacity="0.1">
    <line x1="0" y1="50" x2="400" y2="50" stroke="white" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="white" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="300" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="white" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="300" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="300" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="white" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="300" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Cadenas principal -->
  <g transform="translate(200, 150)">
    <!-- Corps du cadenas -->
    <rect x="-40" y="0" width="80" height="70" rx="8" fill="url(#lockGradient)" stroke="white" stroke-width="3"/>
    
    <!-- Anse du cadenas -->
    <path d="M -30,-50 Q -30,-70 0,-70 Q 30,-70 30,-50 L 30,-10 Q 30,0 20,0 L 20,-45 Q 20,-55 0,-55 Q -20,-55 -20,-45 L -20,0 Q -30,0 -30,-10 Z" 
          fill="url(#lockGradient)" stroke="white" stroke-width="3"/>
    
    <!-- Trou de serrure -->
    <circle cx="0" cy="25" r="8" fill="#1e3a8a"/>
    <rect x="-3" y="25" width="6" height="20" rx="2" fill="#1e3a8a"/>
  </g>
  
  <!-- Icônes de sécurité autour -->
  <g opacity="0.3">
    <!-- Bouclier gauche -->
    <path d="M 60,100 L 60,80 L 80,70 L 100,80 L 100,100 Q 100,120 80,130 Q 60,120 60,100 Z" 
          fill="none" stroke="white" stroke-width="2"/>
    
    <!-- Bouclier droit -->
    <path d="M 300,100 L 300,80 L 320,70 L 340,80 L 340,100 Q 340,120 320,130 Q 300,120 300,100 Z" 
          fill="none" stroke="white" stroke-width="2"/>
    
    <!-- Clé en haut -->
    <g transform="translate(200, 40)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="white" stroke-width="2"/>
      <line x1="0" y1="0" x2="25" y2="0" stroke="white" stroke-width="2"/>
      <line x1="20" y1="-4" x2="20" y2="4" stroke="white" stroke-width="2"/>
      <line x1="25" y1="-4" x2="25" y2="4" stroke="white" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Texte "CONFIDENTIEL" -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="white" text-anchor="middle" opacity="0.8">CONFIDENTIEL</text>
</svg>
